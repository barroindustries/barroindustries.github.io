name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check on every js/*.js and scripts/*.js
        run: |
          set -e
          fail=0
          for f in js/*.js scripts/*.js; do
            echo "checking $f"
            node --check "$f" || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more files failed node --check"
            exit 1
          fi

  node-version-pin:
    name: All workflow node-version entries must be '20'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check node-version pins
        run: |
          fail=0
          for f in .github/workflows/*.yml; do
            [ "$f" = ".github/workflows/ci.yml" ] && continue
            # Match real YAML keys only: 'node-version:' at start of a (possibly
            # inline-braced) mapping entry; strip quotes/braces/space from value.
            while IFS= read -r raw; do
              [ -z "$raw" ] && continue
              val=$(printf '%s' "$raw" | sed -E 's/.*node-version:[[:space:]]*//; s/[}"'"'"'[:space:]]//g')
              if [ "$val" != "20" ]; then
                echo "::error::$f pins node-version '$val' (must be 20)"
                fail=1
              fi
            done <<EOF2
$(grep -hoE "node-version:[[:space:]]*[^,}#]*" "$f" || true)
EOF2
          done
          [ "$fail" -ne 0 ] && exit 1
          echo "All node-version entries are pinned to 20"

  backup-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check backup coverage
        run: node scripts/check-backup-coverage.js
