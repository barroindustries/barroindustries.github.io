name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check on every js/*.js and scripts/*.js
        run: |
          set -e
          fail=0
          for f in js/*.js scripts/*.js; do
            echo "checking $f"
            node --check "$f" || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more files failed node --check"
            exit 1
          fi

  node-version-pin:
    name: All workflow node-version entries must be '20'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check node-version pins
        shell: python
        run: |
          import glob, re, sys
          fail = False
          for f in glob.glob('.github/workflows/*.yml'):
              if f.endswith('ci.yml'):
                  continue
              for m in re.finditer(r"node-version:\s*['\"]?([^'\"\s,}#]+)", open(f).read()):
                  if m.group(1) != '20':
                      print(f"::error::{f} pins node-version '{m.group(1)}' (must be 20)")
                      fail = True
          if fail:
              sys.exit(1)
          print('All node-version entries are pinned to 20')

  backup-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check backup coverage
        run: node scripts/check-backup-coverage.js
