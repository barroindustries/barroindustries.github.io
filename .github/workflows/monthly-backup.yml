name: Monthly Firestore → Google Drive Backup

on:
  schedule:
    # 12:01 AM Philippine Time on the 1st of every month
    # PH Time = UTC+8, so 12:01 AM PH = 16:01 UTC previous day
    - cron: '1 16 1 * *'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Export Firestore data to Google Drive

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run monthly backup
        run: node monthly-backup.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_SERVICE_ACCOUNT:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DRIVE_FOLDER_ID:          ${{ secrets.DRIVE_FOLDER_ID }}
          FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:  ${{ secrets.FIREBASE_STORAGE_BUCKET }}
