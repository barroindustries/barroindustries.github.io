name: Daily File Sync — Firebase Storage → Google Drive

on:
  schedule:
    - cron: '0 16 * * *'   # 12:00 AM Philippine Time (UTC+8) = 16:00 UTC every day
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync files to Google Drive

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run sync
        run: node sync-to-drive.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT:   ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_SERVICE_ACCOUNT:     ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DRIVE_FOLDER_ID:            ${{ secrets.DRIVE_FOLDER_ID }}
          FIREBASE_PROJECT_ID:        ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:    ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          GOOGLE_OAUTH_CLIENT_ID:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
