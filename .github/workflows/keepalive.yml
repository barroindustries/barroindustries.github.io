name: Keepalive — Prevent workflow auto-disable

# GitHub disables scheduled workflows after 60 days of repo inactivity.
# This workflow runs monthly and touches a timestamp file to keep the repo
# active, ensuring the daily file sync and monthly backup never get disabled.

on:
  schedule:
    # 2:00 AM Philippine Time on the 15th of every month
    # PH Time = UTC+8, so 2:00 AM PH on the 15th = 18:00 UTC on the 14th
    - cron: '0 18 14 * *'
  workflow_dispatch:   # Manual trigger if needed

jobs:
  keepalive:
    runs-on: ubuntu-latest
    name: Keep workflows active

    permissions:
      contents: write   # needed to push the timestamp commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update keepalive timestamp
        run: |
          echo "Last keepalive: $(date -u '+%Y-%m-%d %H:%M UTC')" > .github/keepalive.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git commit -m "chore: keepalive $(date -u '+%Y-%m')" || echo "Nothing to commit"
          git push
