<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A0A1A"/>
      <stop offset="45%"  stop-color="#131330"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FF9F0A"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFD60A"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect x="0.5" y="0.5" width="31" height="31" rx="7.5"/>
    </clipPath>
  </defs>

  <!-- Dark card background -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="url(#bg)"/>

  <!-- Inner sheen -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="url(#sheen)" clip-path="url(#card-clip)"/>

  <!-- Gold top trim line -->
  <line x1="5" y1="1" x2="27" y2="1" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- "BI" text -->
  <text
    x="16" y="21"
    font-family="-apple-system, 'Inter', sans-serif"
    font-size="14" font-weight="800"
    text-anchor="middle"
    fill="url(#text-grad)"
    letter-spacing="0.5"
  >BI</text>

  <!-- Gold border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5"
    fill="none"
    stroke="url(#gold)"
    stroke-width="1"
    opacity="0.5"/>
</svg>
